# Local env file support for development. Render will still use dashboard env vars.
spring.config.import=optional:file:.env[.properties]

# Server
server.port=${PORT:8080}

# DataSource (MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:mysql://localhost:3306/loan_discovery?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
security.jwt.secret=${JWT_SECRET:replace-with-a-long-random-secret}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Admin
app.admin.email=${ADMIN_EMAIL:admin@loandiscovery.local}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://loan-discovery-app.vercel.app,http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173}

# Razorpay IFSC API
razorpay.ifsc.base-url=https://ifsc.razorpay.com
