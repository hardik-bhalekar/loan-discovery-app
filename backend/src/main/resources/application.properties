# Local env file support for development. Render will still use dashboard env vars.
spring.config.import=optional:file:.env[.properties]

# Server
server.port=${PORT:8080}

# DataSource (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/loan_discovery?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Tuning (HikariCP)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:50}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:10}
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Redis Caching & Rate Limiting
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# JWT
security.jwt.secret=${JWT_SECRET:replace-with-a-long-random-secret}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Admin
app.admin.email=${ADMIN_EMAIL:admin@loandiscovery.local}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://loan-discovery-app.vercel.app,http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173}

# Razorpay IFSC API
razorpay.ifsc.base-url=https://ifsc.razorpay.com
