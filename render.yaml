services:
  - type: web
    name: dhanpath-api
    runtime: java
    rootDir: backend
    buildCommand: chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: ADMIN_EMAIL
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "https://loan-discovery-app.vercel.app,http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173"