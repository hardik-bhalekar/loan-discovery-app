services:
  - type: web
    name: loan-discovery-backend
    env: java
    rootDir: backend
    buildCommand: mvn -q -DskipTests package
    startCommand: java -jar target/loan-discovery-backend-1.0.0.jar
    plan: free
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: ADMIN_EMAIL
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false